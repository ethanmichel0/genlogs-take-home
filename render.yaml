services:
  - type: web
    name: genlogs-take-home-1
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app.main:app --app-dir backend --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://genlogs-take-home-2.onrender.com

  - type: web
    name: genlogs-take-home-2
    runtime: static
    buildCommand: npm ci --prefix frontend && npm run build --prefix frontend
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://genlogs-take-home-1.onrender.com
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
